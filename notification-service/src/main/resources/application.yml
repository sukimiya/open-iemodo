server:
  port: 8093

spring:
  application:
    name: notification-service

  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:iemodo}
    user: ${DB_USERNAME:iemodo}
    password: ${DB_PASSWORD:iemodo123}
    schemas: schema_tenant_001,schema_tenant_002
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─── Email (SMTP) ─────────────────────────────────────────────────────────
  # Local dev: run `docker run -p 1025:1025 -p 8025:8025 mailhog/mailhog`
  # Production: replace with SendGrid/SES SMTP credentials via env vars
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

iemodo:
  notification:
    from-address: ${MAIL_FROM:noreply@iemodo.com}
    from-name: ${MAIL_FROM_NAME:iemodo}
  tenants:
    - id: tenant_001
      type: SCHEMA
      schema: schema_tenant_001
      host: ${DB_HOST:localhost}
      port: ${DB_PORT:5433}
      database: ${DB_NAME:iemodo}
      username: ${DB_USERNAME:iemodo}
      password: ${DB_PASSWORD:iemodo123}
    - id: tenant_002
      type: SCHEMA
      schema: schema_tenant_002
      host: ${DB_HOST:localhost}
      port: ${DB_PORT:5433}
      database: ${DB_NAME:iemodo}
      username: ${DB_USERNAME:iemodo}
      password: ${DB_PASSWORD:iemodo123}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.iemodo: DEBUG
    org.flywaydb: INFO
