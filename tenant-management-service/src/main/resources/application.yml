server:
  port: 8091

spring:
  application:
    name: tenant-management-service

  config:
    import: "nacos:tenant-management.yaml?group=IEMODO&refreshEnabled=true"

  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      discovery:
        enabled: true
        namespace: public
        group: IEMODO
      config:
        enabled: true
        namespace: public
        group: IEMODO
        file-extension: yaml

  # R2DBC for reactive database access
  r2dbc:
    url: r2dbc:postgresql://localhost:5433/iemodo?schema=tenant_meta
    username: ${DB_USER:iemodo}
    password: ${DB_PASS:iemodo}

  # Flyway for schema migrations (uses JDBC, not R2DBC)
  flyway:
    url: jdbc:postgresql://localhost:5433/iemodo?currentSchema=tenant_meta
    user: ${DB_USER:iemodo}
    password: ${DB_PASS:iemodo}
    schemas: tenant_meta
    locations: classpath:db/migration
    baseline-on-migrate: true

# Logging
logging:
  level:
    com.iemodo.tenant: INFO
    org.springframework.data.r2dbc: WARN

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
