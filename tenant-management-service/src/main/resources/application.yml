server:
  port: 8091

spring:
  application:
    name: tenant-management-service

  # R2DBC for reactive database access
  r2dbc:
    url: r2dbc:postgresql://localhost:5433/iemodo?schema=tenant_meta
    username: ${DB_USER:iemodo}
    password: ${DB_PASS:iemodo}

  # Flyway for schema migrations (uses JDBC, not R2DBC)
  flyway:
    url: jdbc:postgresql://localhost:5433/iemodo?currentSchema=tenant_meta
    user: ${DB_USER:iemodo}
    password: ${DB_PASS:iemodo}
    schemas: tenant_meta
    locations: classpath:db/migration
    baseline-on-migrate: true

# Logging
logging:
  level:
    com.iemodo.tenant: INFO
    org.springframework.data.r2dbc: WARN

# Stripe Configuration
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

# iemodo billing URLs
iemodo:
  billing:
    success-url: ${BILLING_SUCCESS_URL:https://app.iemodo.com/settings/billing?success=true}
    cancel-url: ${BILLING_CANCEL_URL:https://app.iemodo.com/settings/billing?canceled=true}
    alert:
      cooldown-hours: ${ALERT_COOLDOWN_HOURS:24}

  services:
    notification: ${NOTIFICATION_SERVICE_URL:http://notification-service:8089}

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
