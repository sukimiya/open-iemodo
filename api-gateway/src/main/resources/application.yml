server:
  port: 8080

spring:
  application:
    name: api-gateway

    # ─── Gateway Routes ────────────────────────────────────────────────────
    gateway:
      discovery:
        locator:
          enabled: false         # manual routes only — no auto-discovery routing
      routes:
        # User Service: /uc/**
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/uc/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1

        # Order Service: /oc/**
        - id: order-service-route
          uri: lb://order-service
          predicates:
            - Path=/oc/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
                redis-rate-limiter.requestedTokens: 1

        # Product Service: /pc/** (placeholder for phase 2 expansion)
        - id: product-service-route
          uri: lb://product-service
          predicates:
            - Path=/pc/**

        # Payment Service: /pay/** — lower burst capacity; financial operations
        - id: payment-service-route
          uri: lb://payment-service
          predicates:
            - Path=/pay/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1

        # Inventory Service: /inv/**
        - id: inventory-service-route
          uri: lb://inventory-service
          predicates:
            - Path=/inv/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 300
                redis-rate-limiter.burstCapacity: 600
                redis-rate-limiter.requestedTokens: 1

        # Pricing Service: /pricing/**
        - id: pricing-service-route
          uri: lb://pricing-service
          predicates:
            - Path=/pricing/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
                redis-rate-limiter.requestedTokens: 1

        # Tax Service: /tax/**
        - id: tax-service-route
          uri: lb://tax-service
          predicates:
            - Path=/tax/**

        # Map Service: /map/**
        - id: map-service-route
          uri: lb://map-service
          predicates:
            - Path=/map/**

        # Marketing Service: /marketing/**
        - id: marketing-service-route
          uri: lb://marketing-service
          predicates:
            - Path=/marketing/**

        # File Service: /file/**
        - id: file-service-route
          uri: lb://file-service
          predicates:
            - Path=/file/**

        # Tenant Management Service: /tenant/**
        - id: tenant-management-service-route
          uri: lb://tenant-management-service
          predicates:
            - Path=/tenant/**

        # Fulfillment Service: /ff/**
        - id: fulfillment-service-route
          uri: lb://fulfillment-service
          predicates:
            - Path=/ff/**

        # Review Service: /review/**
        - id: review-service-route
          uri: lb://review-service
          predicates:
            - Path=/review/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1

        # RMA Service: /rma/**
        - id: rma-service-route
          uri: lb://rma-service
          predicates:
            - Path=/rma/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                redis-rate-limiter.requestedTokens: 1

        # Notification Service: /notify/** (internal — service-to-service only)
        - id: notification-service-route
          uri: lb://notification-service
          predicates:
            - Path=/notify/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
                redis-rate-limiter.requestedTokens: 1

        # Swagger API Docs aggregation
        - id: user-service-api-docs
          uri: lb://user-service
          predicates:
            - Path=/user-service/v3/api-docs
          filters:
            - RewritePath=/user-service/(?<segment>.*), /${segment}

        - id: product-service-api-docs
          uri: lb://product-service
          predicates:
            - Path=/product-service/v3/api-docs
          filters:
            - RewritePath=/product-service/(?<segment>.*), /${segment}

        - id: order-service-api-docs
          uri: lb://order-service
          predicates:
            - Path=/order-service/v3/api-docs
          filters:
            - RewritePath=/order-service/(?<segment>.*), /${segment}

        - id: inventory-service-api-docs
          uri: lb://inventory-service
          predicates:
            - Path=/inventory-service/v3/api-docs
          filters:
            - RewritePath=/inventory-service/(?<segment>.*), /${segment}

        - id: marketing-service-api-docs
          uri: lb://marketing-service
          predicates:
            - Path=/marketing-service/v3/api-docs
          filters:
            - RewritePath=/marketing-service/(?<segment>.*), /${segment}

        - id: payment-service-api-docs
          uri: lb://payment-service
          predicates:
            - Path=/payment-service/v3/api-docs
          filters:
            - RewritePath=/payment-service/(?<segment>.*), /${segment}

        - id: pricing-service-api-docs
          uri: lb://pricing-service
          predicates:
            - Path=/pricing-service/v3/api-docs
          filters:
            - RewritePath=/pricing-service/(?<segment>.*), /${segment}

        - id: tax-service-api-docs
          uri: lb://tax-service
          predicates:
            - Path=/tax-service/v3/api-docs
          filters:
            - RewritePath=/tax-service/(?<segment>.*), /${segment}

        - id: map-service-api-docs
          uri: lb://map-service
          predicates:
            - Path=/map-service/v3/api-docs
          filters:
            - RewritePath=/map-service/(?<segment>.*), /${segment}

        - id: file-service-api-docs
          uri: lb://file-service
          predicates:
            - Path=/file-service/v3/api-docs
          filters:
            - RewritePath=/file-service/(?<segment>.*), /${segment}

        - id: tenant-management-service-api-docs
          uri: lb://tenant-management-service
          predicates:
            - Path=/tenant-management-service/v3/api-docs
          filters:
            - RewritePath=/tenant-management-service/(?<segment>.*), /${segment}

        - id: fulfillment-service-api-docs
          uri: lb://fulfillment-service
          predicates:
            - Path=/fulfillment-service/v3/api-docs
          filters:
            - RewritePath=/fulfillment-service/(?<segment>.*), /${segment}

    # ─── Sentinel ─────────────────────────────────────────────────────────
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
        port: 8719
      eager: true

  # ─── R2DBC (dynamic routes + rate limits) ─────────────────────────────
  r2dbc:
    url: r2dbc:postgresql://localhost:5433/iemodo?schema=gateway_config
    username: ${DB_USER:iemodo}
    password: ${DB_PASS:iemodo}
    pool:
      max-size: 10
      initial-size: 5

  # ─── Redis (JWT blacklist + rate limiter) ─────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # ─── Flyway for schema management ─────────────────────────────────────
  flyway:
    url: jdbc:postgresql://localhost:5433/iemodo?currentSchema=gateway_config
    user: ${DB_USER:iemodo}
    password: ${DB_PASS:iemodo}
    schemas: gateway_config
    locations: classpath:db/migration
    baseline-on-migrate: true

# ─── Gateway JWT configuration ──────────────────────────────────────────
iemodo:
  services:
    tenant-management: ${TENANT_MANAGEMENT_URL:http://tenant-management-service:8091}

  gateway:
    jwt:
      # RSA public key for verifying tokens issued by user-service
      # In production: load from Nacos/Vault. For dev, inline PEM or file path.
      public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:jwt/public.pem}
    # Paths that do NOT require a valid JWT
    whitelist:
      - POST:/uc/api/v1/auth/register
      - POST:/uc/api/v1/auth/login
      - POST:/uc/api/v1/auth/refresh
      - GET:/uc/api/v1/auth/oauth2/**
      - GET:/actuator/**
      - GET:/health
      - GET:/swagger-ui/**
      - GET:/v3/api-docs/**
      - GET:/webjars/swagger-ui/**
      - /swagger-ui.html

# ─── Actuator ───────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always

# ─── Logging ─────────────────────────────────────────────────────────────
logging:
  level:
    com.iemodo: DEBUG
    org.springframework.cloud.gateway: INFO
    com.alibaba.cloud.sentinel: INFO
