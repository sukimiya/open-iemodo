server:
  port: 8090

spring:
  application:
    name: file-service

# MinIO Configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  url-expiry: 3600  # Pre-signed URL expiry in seconds

# Multipart file upload settings
spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 100MB

# Logging
logging:
  level:
    com.iemodo.file: INFO
    io.minio: WARN

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
