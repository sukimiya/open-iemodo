server:
  port: 8083

spring:
  application:
    name: order-service

  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:iemodo}
    user: ${DB_USERNAME:iemodo}
    password: ${DB_PASSWORD:iemodo123}
    schemas: schema_tenant_001,schema_tenant_002
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}

iemodo:
  services:
    tenant-management: ${TENANT_MANAGEMENT_URL:http://localhost:8091}

  tenants:
    - id: tenant_001
      type: SCHEMA
      schema: schema_tenant_001
      host: ${DB_HOST:localhost}
      port: ${DB_PORT:5433}
      database: ${DB_NAME:iemodo}
      username: ${DB_USERNAME:iemodo}
      password: ${DB_PASSWORD:iemodo123}
    - id: tenant_002
      type: SCHEMA
      schema: schema_tenant_002
      host: ${DB_HOST:localhost}
      port: ${DB_PORT:5433}
      database: ${DB_NAME:iemodo}
      username: ${DB_USERNAME:iemodo}
      password: ${DB_PASSWORD:iemodo123}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.iemodo: DEBUG
    org.flywaydb: INFO
