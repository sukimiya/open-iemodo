name: CI

on:
  push:
    branches: [main, iemodo-lite]
  pull_request:
    branches: [main, iemodo-lite]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: iemodo
          POSTGRES_USER: iemodo
          POSTGRES_PASSWORD: iemodo123
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U iemodo -d iemodo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build & test
        run: mvn verify -pl app-boot -am -Dspring.flyway.enabled=false
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Package without tests
        run: mvn package -pl app-boot -am -Dmaven.test.skip=true -DskipTests

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/iemodo-lite' || github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/iemodo-lite' || github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
