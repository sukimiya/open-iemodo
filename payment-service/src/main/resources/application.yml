server:
  port: 8085

spring:
  application:
    name: payment-service

  config:
    import: "nacos:payment-service.yaml?group=IEMODO&refreshEnabled=true"

  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      discovery:
        enabled: true
        namespace: public
        group: IEMODO
      config:
        enabled: true
        namespace: public
        group: IEMODO
        file-extension: yaml

  r2dbc:
    url: r2dbc:postgresql://localhost:5433/iemodo_platform
    username: iemodo
    password: iemodo123

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5433/iemodo_platform
    user: iemodo
    password: iemodo123
    schemas:
      - payment_tenant_001
      - payment_tenant_002
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password: redis123
      database: 0

  cloud:
    nacos:
      server-addr: localhost:8848
      username: nacos
      password: nacos
      discovery:
        enabled: true
        namespace: public
        group: DEFAULT_GROUP
      config:
        enabled: true
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml
        import-check:
          enabled: false

# Stripe Configuration
stripe:
  public-key: ${STRIPE_PUBLIC_KEY:pk_test_placeholder}
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

# Logging
logging:
  level:
    com.iemodo.payment: DEBUG
    org.springframework.data.r2dbc: DEBUG
