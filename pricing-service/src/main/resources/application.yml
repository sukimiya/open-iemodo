server:
  port: 8086

spring:
  application:
    name: pricing-service

  config:
    import: "nacos:pricing-service.yaml?group=IEMODO&refreshEnabled=true"

  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      discovery:
        enabled: true
        namespace: public
        group: IEMODO
      config:
        enabled: true
        namespace: public
        group: IEMODO
        file-extension: yaml

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:iemodo}
    username: ${DB_USER:iemodo}
    password: ${DB_PASSWORD:iemodo123}
    pool:
      max-size: 10
      initial-size: 2

  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:iemodo}
    user: ${DB_USER:iemodo}
    password: ${DB_PASSWORD:iemodo123}
    schemas: pricing
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

# Exchange rate configuration
exchange:
  fixer:
    api-key: ${FIXER_API_KEY:}
    base-url: ${FIXER_BASE_URL:https://api.fixer.io}
  base-currency: USD
  cache:
    l1-ttl-minutes: 10
    l2-ttl-hours: 1

# Logging
logging:
  level:
    com.iemodo.pricing: DEBUG
    org.springframework.data.r2dbc: WARN

# Management
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
